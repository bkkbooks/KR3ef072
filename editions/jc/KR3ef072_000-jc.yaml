body:
  text: 傷寒治例引傷寒治例者名醫劉翁之所著也翁名純字宗厚其先淮南人以事移關中遂家焉予晚生不及識翁因企慕而訪求翁後見其譜牒乃簪組裔也翁為人博極群書尤精醫道厥考橘泉先生受業丹溪之門及翁繼之醫道大行家聲大著遂以所學於父師者為此書蓋有以溯素問之源撮仲景之旨治傷寒者循此而行如射而中獵而獲足以起死回生易危為安無夭橫之危皆躋仁壽之域矣予得而刻之蓋有以廣傳翁之德惠不特此爾翁之所著又有醫經小學玉機微義傳於世云成化己亥歲陽月吉旦易庵居士蕭謙書傷寒治例發熱屬表者即風寒客於皮膚陽氣怫鬱所致翕翕發熱若翕所覆邪在外若小便黃非在外也屬裡者陽氣下陷入陰分蒸蒸發熱若熏蒸邪在內若小便清非在內也邪在三陽太陽證多邪在三陰少陰證多與潮熱若同而異此屬半表與煩躁相類而非此屬半里解表有發汗解肌之別發汗脈浮緊為表實無汗寒傷榮宜麻黃湯解肌脈浮緩為表虛自汗風傷衛宜桂枝湯脈浮緩反無汗脈浮緊反煩躁宜桂枝麻黃各半湯和榮衛風兼寒脈寒兼風脈榮衛兩傷俱實脈浮緊無汗宜大青龍湯解肌表裡發熱脈浮大小便赤煩渴此表裡證俱見或汗後脈浮小便澀並宜五苓散已上二條屬兩解例隨經治例太陽麻黃湯太陽陽明六物麻黃湯陽明葛根湯太陽少陽七物柴胡湯六經表少陽小柴胡湯太陰桂枝湯少陰麻黃附子細辛湯厥陰當歸四逆湯合病表陽明少陽葛根柴胡湯太陰少陰真武湯太陰厥陰當歸四逆湯少陰厥陰四逆湯助陽發熱脈沉無力或少陰病始得之反熱者亦屬表所以一經表有一經表藥也溫經發熱為邪在表當汗脈沉細屬裡而當溫散凡熱而脈沉為陽虛經虛隨病治例汗後不解脈浮大而遲或緊澀或尺不應宜小建中加歸耆俟脈盛再汗下或身熱汗出濈濈然脈實者調胃承氣或汗後不惡寒但熱者實也並陽明發熱汗多者急下之大承氣湯太陽病三五日發汗不解蒸蒸發熱屬胃也調胃承氣內實身熱汗不出反惡熱或發熱汗出不解心下痞嘔吐而利並大柴胡湯非痞滿不可下非潮熱渴不可下非脈沉數不可下非譫語不可下隨病變例太陽病八九日如瘧狀發熱惡寒熱多寒少或熱而脈微惡寒者並宜桂枝麻黃各半湯如大下後身熱不去心中結痛用梔子豉湯因以丸藥下後身熱不去微煩者梔子乾薑湯陽明脈浮發熱渴欲飲水小便不利者豬苓湯主之汗多者不可與陽明脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則煩躁反譫語若加燒針則必怵惕煩而不得眠若下之則胃虛客氣動心中懊憹舌上苔者梔子豉湯主之全在隨證臨病加減擇法六經里太陽五苓散陽明調胃承氣湯少陽黃芩湯太陰桂枝加大黃湯少陰黃連阿膠湯厥陰桃仁承氣湯合病里三陽合病白虎湯太陽陽明小承氣湯正陽陽明大承氣湯合三陰即是兩感證也隨時治例傷寒本為卒病故用已上一表一里治例如夏至後用麻黃知母石膏湯或以防風通聖散加減用者是從其時令或地理方宜故不可執一也有近代諸方如正氣五積之類禁例太陽病禁居多陽明二禁少陽三禁舉其略則知其餘證用藥皆有禁例也如藥禁針例汗不出悽悽惡寒取玉枕大杼肝俞膈俞陶道身熱惡寒後谿身熱汗出手足厥冷取大都身熱頭痛食不下三焦俞汗不出取合谷後谿陽池厲兌解谿風池身熱而喘取三間餘熱不盡取曲池煩滿汗不出取風池命門汗出寒熱取五處攢竹上脘煩心好嘔取巨闕商丘身熱頭痛汗不出取曲泉身熱進退頭痛取神道關元懸顱已上出針經雙解里證已急或脈浮或頭疼風寒表證仍在者過經不解是也大柴胡主之此解表功里法又非前兩解之比漬形為汗熱而脈弦細非往來寒熱不可和非脅肋痛不可和非胸滿而嘔不可和非脈緩不可和或表證未罷邪氣傳裡里未實是為半表半裡或自皮膚漸傳入里或自內熱達於表直指方曰凡當汗下如有他證相妨切須和解俟其他證已退卻依汗下法小柴胡湯活人書去半夏名黃龍湯陳孔碩名沖和湯海藏名三禁湯孫兆名黃胡湯與四物對名調經湯守真加減名三元湯散熱生津益氣身熱目痛鼻乾惡熱自汗脈尺寸浮長白虎湯片玉云得汗脈靜身熱不退是發汗太過胃中亡津液故也處以生津液益氣血養胃氣之藥參朮茯苓麥門冬升麻陳皮甘草桂耆歸芍半夏飴糖三服而愈或只用補中益氣湯出血曾氏家學治傷寒七八日不解自胸上至頭目黑紫壅腫寸脈浮大而數是欲作衄而不能出也用干慄干任兩鼻彈刺之出血五六升而安蒻葉亦可西北方人或於兩尺澤中出血如射即安諒亦此意復脈龐氏云有不因大汗下而兩手忽無脈謂之雙伏徊一手無謂之單伏或下過如此必有正汗急四逆輩溫之晬時有汗便安脈汗不出者死脈結用炙甘草湯越婢太陽病發熱惡寒熱多寒少脈微弱不可表散宜桂枝二越婢一湯以解表邪而益衛滋津液外迎熏蒸在外取汗是也但病脈微弱遲細動氣瘡淋亡血虛煩皆不可用此灸六脈沉細一息二三至取氣海關元少陰發熱取太谿劫有汗下後陰陽之氣下陷熱不退其人昏倦不渴不食者用來復丹靈砂之類吐病如桂枝證頭不痛項不強脈浮胸中痞硬氣上逆胸有寒也宜瓜蒂散吐之或心中結痛而煩宜梔子豉湯之類四證似傷寒寒痰腳氣食勞煩皆從病別治發熱反欲得衣熱在肌表寒在骨髓溫脈沉手足微厥下利發熱四逆湯活人書云表熱裡寒先與陰旦湯寒已次用小柴胡加桂溫表反治身寒反不欲近衣熱在骨髓寒在肌表從治先用白虎加人參湯次用麻桂各半湯下脈滑而厥口燥舌乾所以少陰惡寒而蜷時時自煩不欲厚衣大柴胡下之惡寒有熱惡寒者發於陽有汗表虛無汗表實無熱惡寒者發於陰陰寒為病口中和陽氣內陷口乾而渴一身盡寒由陰氣上入陽中或陽微陰虛相搏之所致有脈沉實為陽盛格陰背惡寒背為陽陽氣不足陰寒盛故耳或三陽合病額有汗口燥不仁清熱用白虎湯發汗表實無汗不惡風麻黃湯或各半湯脈緊寒傷榮麻黃湯脈浮升麻湯解肌表虛自汗惡風桂枝湯保命集曰表未解葛根湯李氏用桂枝湯嚴仁庵曰風傷衛桂枝湯溫發汗後不解反惡寒者虛也陽微也與芍藥甘草附子湯以補榮衛在陰者四肢冷大小便滑溫中湯四逆湯或脈沉緊且細內自煩躁不飲水者此為陰盛格陽身冷宜四逆湯霹靂散尺脈遲小建中湯易簡方加附子名附子建中湯身寒拘急泄下重腹痛皆少陰也宜溫中益陰和解兼潮熱柴胡加桂湯汗已寒而心下痞附子瀉心湯下寒而潮熱腹滿與小承氣湯灸背惡寒口中和須灸之關元穴熨惡風悉屬於陽有汗而惡風為中風衛病也桂枝加葛無汗而惡風為傷寒榮病也葛根湯解肌設反無汗雖服桂枝反煩不解無里證刺先刺風池風府卻與桂枝葛根湯發表無汗而惡風溫經發汗多漏不止則亡陽外不固是以惡風以桂附溫其經而固衛散濕風濕相搏骨節疼濕勝自汗而皮腠不密是以惡風必以甘草附子湯散濕而實其衛利痰憎寒發熱惡風自汗胸膈滿氣上衝不得息而頭不疼項不強為有痰隨其虛實散利與陽爭則氣鬱不發於外而為熱寒熱身之陽虛則邪客於表與陽爭則為寒身之陰虛則邪客於裡與陰爭則為熱與陰爭則憤然而熱故寒已而熱作焉表裡邪在表多寒多邪在裡多熱多半在表半在裡則寒熱相半和解半表裡往來寒熱小柴胡主之熱多白虎加桂湯寒多柴胡加桂湯先寒後熱陽不足也小柴胡加桂湯先熱後寒陰不足也小柴胡加芍藥湯主之難知曰若用柴胡而移其時於早晚氣移於血血移於氣是邪無所容之地知可解也下病日多而結熱在裡復往來寒熱大柴胡湯主之惡熱者胃實也調胃承氣湯下之兩解熱多寒少脈浮各半湯微弱桂枝二越婢一湯脈遲小建中加黃耆或溫中寒多熱少不煩躁手足厥逆為傷寒脈反浮緩為中風大青龍主之或各半湯仲景一書只有熱多寒少之條無寒多熱少之證潮熱發於寅卯巳午時者邪未入胃日晡所發者乃入於胃也有兼證結胸脈不浮陷胸湯腹滿身黃梔子柏皮湯和解小柴胡湯脈浮兼寒加桂攻下邪入胃腹滿脈實大便硬脈滑脈浮仍和解解肌脈虛自汗桂枝湯自汗多主衛此衛氣不和兼熱邪所幹也太陽中暍汗出惡寒身熱而渴汗出而濡風濕自甚皆邪干於衛氣氣不能固於外皮膚為之疏而津液妄泄濈濈潤潤然出也表虛汗後惡寒表未解惡風微惡寒里未和汗出不惡寒熱越陽明發熱解肌桂枝湯滲泄渴者五苓散補自汗而小便數者不可與桂枝宜芍藥甘草二物或小建中諸方加耆名黃耆建中湯和解柴胡加桂湯溫經發汗多遂漏不止曰漏風亡陽桂枝附子湯表虛未解桂枝湯四逆厥有汗四逆湯疏風太陽病熱脈沉細搖頭口噤背反汗出不惡寒名柔痓中風也宜小續命湯汗多亡陽惡風煩躁先與防風白朮牡蠣湯汗止次服小建中湯下里未和熱越故下之才覺汗多未至津液干速下之則為捷徑免致用蜜導也從治吐利止後汗而厥脈微欲絕通脈四逆清暑暑邪干衛非傷寒比流濕潤燥多汗而濡此其風濕甚濕邪干於衛也撲法蜜導陽明自汗小便利為津液內竭雖硬不可攻盜汗睡而汗出覺而則止方是非若雜證邪在半表裡使然也解肌出而微惡寒小柴胡加桂湯和解下素有積或熱在內脈實撲法白朮白芷藁本川芎各一兩米粉一兩半為末周身撲之頭汗邪搏諸陽津液上湊則汗見於頭也瘀熱在裡身必發黃小便不利引水熱入血室陽明被火水結胸中寒濕相搏邪在半表裡和解頭汗惡寒小柴胡加桂汗不止者難治若汗下後胸滿微結如往來寒熱手足冷心下滿脈細惡寒小便不利此皆頭汗之逆者小便不利而成關格陽脫也喘者亦然下瘀熱在裡手足汗熱聚於胃是津液傍達也有陽明中寒不能食小便不利手足濈濈然汗出此欲作痼瘕即是中寒病下胃熱可下溫寒聚於胃為不可下當溫之無汗寒邪傷人獨不汗出寒傷榮而不傷衛衛無邪氣所幹則皮腠得以密津液得以固是以汗不出也及其傳變里為熱則亦使自汗蓋熱則榮衛通服三劑無汗熱病脈躁盛而不得汗經謂陽脈之極也主死助陽熟附配麻黃發中有補出趙氏釋疑乾薑配生附補中有發無汗而解者屬少陽也戰而汗解者太陽也不戰汗解者陽明也頭痛太陽證居多三陽經受風寒伏留而不去則名厥頭痛痛甚而手足寒者為黃病頭頂痛屬太陽經頭角痛屬少陽額痛及鼻屬陽明發汗傷寒無汗發熱惡寒不惡風麻黃湯不大便六七日頭痛有熱小便清者知不在裡仍在表也當汗解痛甚者必衄葛根蔥白湯荊防散川芎石膏湯解肌傷風汗出發熱惡風不惡寒桂枝湯輕者柴胡桂枝湯溫經厥陰少陰證嘔而吐沫吳茱萸湯夏月頭痛身冷自汗此中暑濕朮附湯清上大頭傷寒須用酒炒黃芩荷葉羌活輩攻下表邪入里不大便有熱脈沉而滑尺寸俱長皆可下之有熱不惡寒反惡熱或不大便小便赤者胃實也宜調胃主之和解邪在半表裡少陽往來寒熱脈弦細宜小柴胡發熱頭痛似瘧欲愈麻桂各半湯分利夏月頭痛惡寒心下煩躁不快五苓散清鎮自汗頭痛及風暑雜病俱宜白虎少加芎荊芥尤妙或竹葉石膏湯吐頭痛及發寒熱脈緊寸大即是痰飲宜瓜蒂散吐之敷痟汗後不解用芷辛烏輩同蔥白搗膏貼於額角吹搐汗後不解用不臥散末吹之鼻內針刺項強發汗表實解肌汗出惡風和解身熱惡風頭項強腹中滿手足溫而渴小柴胡主之下結胸病亦項強如柔痓狀大陷胸主之針頭眩少陽與太陽並病故眩者責其虛也眩冒者皆發汗下後所致是知其陽虛也針經云上則眩下虛則厥與風家眩暈同和解半表裡邪漸行於里表中易虛故時時目眩也中風家多頭眩宜解肌傷寒亦然溫經頭眩身瞤動或虛弱汗多宜真武湯吹鼻眩暈鼻塞而煩此頭中寒濕宜瓜蒂散吹鼻中取下濕水胸脅滿胸滿多帶表證多夾半表半裡證邪氣自表傷里必先自胸脅已次經心腹入胃發汗太陽陽明合病調中寒中太陰誤下之愈不快䐜脹或吐或利理中湯枳實陳皮輩和解半表裡脅下痞硬沖和去棗加牡蠣或已汗下胸脅滿微結小便不利渴而不嘔但頭汗出或往來寒熱柴胡薑桂湯吐邪氣留於胸中聚而為實者非上吐不可如四日在胸吐之則已刺兼譫語刺期門下陽明少陽合病下利身熱脅痛大柴胡湯主之汗後頭疼心下痞脅滿疼短氣十棗湯心下滿是不經下後而滿有吐下之殊若下後滿者又有結痞之別虛邪留滯則但滿而不硬痛也脈雙弦而遲者必心下硬實則心下滿虛則心下悸和解滿而不痛半夏瀉心湯分消飲水多心下脹滿用牡蠣澤瀉湯利小水傷寒論云心下滿心下悸皆邪在胸水停也吐邪在胸中病則滿而煩飢不能食者下心下滿而硬痛近乎結胸大陷胸湯主之心下痞按之濡脈關上浮者大黃黃連瀉心湯諸瀉心例心下痞而復惡寒汗出者附子瀉心湯汗後胃不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯多痞而乾嘔心煩不得安下之痞益甚此非熱但胃中虛客氣上逆故硬也甘草瀉心湯結胸有下之早而成者脈浮緊心下硬痛未可下之按則痛為小結不按而痛為大結直指方曰臟氣閉結而不復流布也結胸證悉具而加之煩躁者為不治藥之所以能勝邪者必待胃氣施布藥力始能溫汗吐下以逐其邪氣邪氣勝胃氣絕者安可為之理中邪在上胸膈痞結或未辨虛實先與理中加枳實尤妙先理其氣枳朮理中丸桔梗枳殼湯韓祗和用七物調中丸看寒熱兼證隨治按不按皆痛者乃熱結在心下也攻下大小陷胸及大陷胸丸選用韓祗和用茯苓陷胸湯究源方用鶴頂丹治陰陽二結如神水漬法仁存方治結胸煩亂欲死凝雪湯漬布薄胸上熱除為度當溫暖四肢防厥逆也泄熱如汗後未全解誤下之誤而之為小結胸煩渴脈實宜三黃瀉心湯表全未解亦不可用輕者小結正在心下按之痛脈浮滑小陷胸湯無熱證者小陷胸三物白散亦可此寒實也重者熱實脈沉緊心下痛大陷胸湯有兼項強如柔痓狀或從心下至臍上不可近者大陷胸湯逐寒無熱證此寒實結也枳實理中丸或三物白散龐氏用檳榔散良方用海蛤散刺期門嚴仁庵刺肺俞婦人因血結胸亦熱入血室刺期門和解結胸有熱或煩渴宜先用沖和加枳實次下本藥活人書治水結沖和去棗加茯苓牡蠣湯此事難知用五苓合枳朮湯飲水不散而結小半夏茯苓湯與水直指方云結胸喘促狂亂極熱大躁用地龍水一服未效再服自然汗出則愈又用太乙牛黃丸竹葉湯調下以手揉其心膈即下二藥兼治上一證灸以黃連巴豆七粒作餅子置臍中以火灸之得利為度痞不痛為痞寸脈浮關脈沉心下滿而不硬按之不痛名曰痞不滿不硬但妨悶者非痞也謂之支飲有下之太早而致凡痞而硬為水停濡者為氣聚保命集云脾不能行氣於四臟結而不散則為痞瀉痞例滿而不痛半夏瀉心湯泄熱而緩脾色黃手足溫心下痞按之濡其脈關上浮者黃連瀉心湯泄虛熱痞而惡寒方見前兼溫通陽乾嘔食臭脅下有水氣者生薑瀉心湯兼止嘔逆下痢腹鳴例見瀉心用甘草瀉心湯兼調胃韓祗和用厚朴瀉心湯宣明論治痞檳榔散雙解胸滿硬按之不痛脈沉緊大柴胡湯解表當先解未解之表宜桂枝湯甚者兼治分利痞而小便不利五苓散散濕痞而下痢直指方用朮附湯和解不滿不硬心下妨悶謂之支結小柴胡加桂湯胸滿而濡者半夏瀉心湯旋覆代赭石湯輕者通用桔梗枳實湯主之直指方加茯苓甘草補亡云常氏用茯苓甘草白朮生薑湯成痿可用振痿湯下心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒十棗湯主之咳逆保命集云胸中氣不交也少陰經至胸中交於厥陰水火相搏而有聲故噫氣也溫胃寒先服理中湯次服旋覆代赭石湯水寒相搏小青龍去麻加附脈微細宜重溫燥之導氣保命集云如聖加枳實湯汗下後喘而噫氣如聖加人參藿香杏仁湯世俗或用橘皮半夏湯下有因失下所致脈散者死便軟用瀉心湯便硬用大承氣湯活人書一名噦傷寒又謂陰陽氣欲作汗升之不上降之不下而咳逆此胃氣上逆所致也劫總錄治嘔吐逆通正散柿蒂散平胃索矩云食谷者噦香橘散主之和解潮熱時時噦與小柴胡瀉心便軟者宜用之如脈浮洪或有熱而咳逆者乃火熱逆上肺不納也甘草瀉心湯清利少陰下利咳而嘔渴心煩不眠豬苓湯主之灸期門嗅法藥無效以硫黃乳香為末酒煎嗅之腹脹滿傷寒一日在皮膚肌肉胸六日入胃是在腹也太陰證居多經謂非太陰腹中無虛滿和解腹中滿痛小柴胡去芩加芍攻下腹滿痛者急下之脹而不大便者急下之大實痛桂枝大黃譫妄脈沉數煩渴不拘日調胃承氣湯溫太陽病反下之因而腹滿時痛桂枝芍藥湯主之腹滿時減者為虛也吐下後心煩腹䐜滿臥起不安此妄下邪氣乘虛入郁胸中為虛煩上下不得通利故宜吐也要識邪氣日漸起所在虛實之的則溫補針艾適當和中氣汗後脹滿者厚朴姜草半夏參湯此脾胃津液不足氣塞不通壅而滿無求子用桔梗半夏湯少腹滿必有物聚而為之滿在上而滿者氣也在下而滿者物也物者溺與血也少腹硬小便自利其人如狂者血證諦也當出不出積而為滿下少腹急結者可攻之桃仁承氣湯輕者犀角地黃湯滲利少腹硬小便不利為無血也當滲利之刺括有中瘀腹虛脹或腹中急痛刺括委中或奪命穴等處煩熱為煩而熱無時而歇是也有陰有陽有真陽內郁陰中伏陽之證虛實發汗邪氣在表而煩分利汗後煩熱而渴辰砂五苓散主之下汗多煩熱脈實宜下之陽明病不吐不下心煩者煩之實也宜調胃承氣和解心煩喜嘔或胸中煩而不嘔經吐而心煩不眠酸棗仁湯吐汗後煩熱心胸煩悶宜人參散吐之反復顛倒心中懊憹但藥有輕重之不同耳實煩而胸中窒者梔子豉湯脈浮上部填塞胸心而滿者用瓜蒂散可水汗後胃干煩不得眠欲飲水者少少與之和中傷寒二三日心中悸而煩者是煩之虛也小建中補之和表裡生津液有寒者附子湯熱者白虎湯脈浮表未解也渴者熱未實上焦燥也宜五苓生津和表陰虛而邪盛熱煩嗅內心中煩不得眠者黃連阿膠湯以扶陰散熱陰虛客熱下利咽痛胸滿心煩與豬膚湯以調陰散熱煩躁煩為擾擾而煩躁為憤躁之躁邪氣在裡煩為內不安躁為外不安有因火劫有陽虛有陰盛兼結胸者死無求子曰脈洪實或滑小便赤者陽躁也脈微手足逆冷大小便利者陰躁也兩解散榮衛風寒太陽中風脈浮而緊不汗出而煩躁大青龍湯主之惡寒而倦時時自煩欲去衣服大柴胡主之解肌煩躁消渴辰砂五苓散與水汗後煩躁不得眠欲水者少少與之和下利咽痛胸滿而煩豬膚湯自汗心煩小便多者芍藥甘草湯下不大便六七日繞臍痛煩躁發作有時此有燥屎也小承氣下之溫陰盛而煩躁少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之證治云八石散治煩躁佳活人書云身冷脈沉疾煩躁不飲水名陰盛隔陽霹靂散火熘丹外臺云陰躁欲坐井水宜熱溫之退陰復陽汗下後晝日煩躁不得眠夜而安靜不渴不嘔無表證脈沉微者乾薑附子湯陰盛發躁名陰躁四逆湯陰盛隔陽身冷脈細煩躁霹靂散補陽益陰發汗下後病仍不解煩躁者茯苓四逆湯無求子云昔人患傷寒身冷脈微手足厥而躁甚醫以艾湯調硫黃末四錢與之即時安臥良久出汗而愈灸傷寒六七日脈微手足厥冷煩躁宜灸厥陰穴扶陰泄熱少陰躁不得眠黃連雞子湯總錄云雞清散治煩躁悶亂絳雪治狂躁發熱大安丸凝水石丸治狂躁悶亂韓氏云不甚實丹砂丸輕者硃砂安神丸熨陰毒用火熨懊憹比之煩悶不甚者也有表未解下早所致有虛有實下陽明無汗小便不利心中懊憹者必發黃二者為邪熱結於胸中當攻下陽明病下之心下懊憹微煩胃中有燥屎吐邪熱鬱於胸中宜梔子豉湯吐之汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹亦用之舌上苔舌上有膜白滑如胎或燥或澀或黃或黑皆熱之淺深也有邪氣傷里或在半表裡或邪氣客於胸中丹田有熱胸上有寒邪初傳入里者也和解陽明病脅下硬滿不大便而嘔舌上白苔者與小柴胡主之吐陽明脈浮緊咽燥腹滿而喘心中懊憹舌上苔者梔子豉湯主之下舌黃未下者下之黑滑皆然清熱生津七八日不解熱結在裡表裡俱熱時時惡風大渴舌上燥白虎加人參湯衄傷寒衄者積熱在表或出口鼻是謂下厥上竭發汗傷寒脈浮緊不發汗因致衄者麻黃湯脈證諦當方可用是發散經中邪氣爾衄家不可發汗蓋慎之也解肌脈浮自汗桂枝湯溫許氏治少陰誤汗衄血及臍中出用姜附湯治本下不大便六七日頭痛有熱而衄者與小承氣下之或涼膈加生地黃分利衄而渴心煩飲則吐者先五苓散次竹葉湯涼血脈微為血虛凡傷寒及溫病應發汗而失之熱蘊為血衄及吐者犀角地黃湯黃芩芍藥不止者茆花湯水貼汗後熱遏血不止用新井水濕草紙於鼻上貼之及頭頂項上皆貼時時易之墨汁倍灰必用畜血熱毒流於下而瘀血者謂之畜血附下血例亦有年高人小便不利者韓祗和用嚏法通之溫經陰證下如豚肝當溫之芎歸朮附湯涼血陽證溢出鮮血當清之芩連生熟地黃地骨柴胡芍藥甘草之類下血太陽病六七日表證仍在脈微而沉反不結胸其人如狂以熱在下焦少腹當硬小便自利者下血乃愈抵當湯主之太陽隨經瘀在裡也傷寒有熱少腹滿硬小便自利為有血也抵當丸主之輕者犀角地黃湯芍藥地黃加大黃黃芩湯孫用和用破棺丹無求子云陽毒入胃下血用消蘊湯韓祗和用地黃湯解肌太陽病不解熱結膀胱發狂血自下者愈不愈者用桂枝湯補中散寒鬱少陰下利膿血者桃花湯以固脫散寒補正補虛消熱許氏治協熱下膿血梅煎散難知云傷寒熱毒入胃下膿血阿膠散小便出血總錄用竹茹湯針少陰證下利便膿血者可刺陽明病下血而譫語者必熱入血室頭汗出者當刺期門下血兼看雜病例吐血當汗不汗熱毒蘊結而成吐血涼血犀角地黃湯升麻湯黃芩湯芍藥地黃湯三黃丸倍灰必用下三黃瀉心湯抵當湯大黃散溫略例上焦血用黃耆桂枝湯中焦血用當歸建中湯增損胃風湯下焦血用芎歸朮附湯桂附六合湯陰證三焦出血色紫不鮮此重沓寒濕化毒凝泣浸漬而成治要用黑錫丹見直指方咳嗽有肺寒而咳有停飲而咳或邪在半表裡發汗表不解心下有水氣乾嘔發熱而咳小青龍主之溫經少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳者真武湯加五味細辛乾薑主之和解小柴胡湯證悉具而咳者本方去參棗生薑加乾薑五味主之此陽邪傳表也少陰病四逆其人或咳者四逆散加乾薑五味主之此為陰邪傳裡也清利見咳逆例中導痰其人素有痰證看熱濕風火宜兼治之喘有邪氣在表不利有水氣射肺形寒飲冷傷肺故其氣逆上為喘有腎氣乘心發汗邪氣外感壅遏使氣不利為病雖汗而喘不已邪在表也雖經汗下亦可發之麻黃杏仁甘草石膏湯龐氏用麻黃甘草湯解肌用桂枝湯加厚朴杏仁汗出而喘者主之兩解心下有水氣乾嘔熱而咳或喘小青龍去麻黃加杏仁主之是散水寒也活人書加茯苓脈盛自汗大柴胡主之傷寒例用茯苓湯即敗毒散去枳殼加陳皮倍柴胡此兼清痰飲也溫直指方曰陰證喘則必促脈伏而厥宜返陰丹證治曰宜理中四逆輩陰毒喘促用來蘇丹潤肺養氣喘促脈浮而厥者或陰陽未和並用五味子湯下或腹滿而喘或潮熱並大柴胡湯或小承氣湯微解之兼結胸者看輕重用陷胸分利水停心下腎氣乘心為悸為喘五苓散清熱內蘊熱邪有汗喘者葛根黃芩黃連湯灸寒邪陷下者灸肺俞咳多者主之嘔吐大抵表邪傳裡裡氣上逆則為嘔也有積為熱有積為寒有停飲有胃脘有膿癰膿不必治吐家多是胃虛冷先嘔後渴此為欲解先渴後嘔此為水停心下龐氏云病傳陰必吐利發汗太陽與陽明合病氣下而不上但下利不嘔裡氣上逆不下者但嘔而不利與葛根加半夏湯傷寒例云兩經俱病邪氣壅盛於表正氣怫鬱於裡邪正分爭爭於下則為利爭於上則為嘔與半夏以下逆氣兩解嘔而發熱柴胡證俱心下急鬱郁微煩大柴胡主之溫經膈上有寒及寒飲或嘔不渴乾薑附子湯乾嘔吐沫頭痛者吳茱萸湯主之清熱有虛熱少氣氣逆欲吐竹葉石膏湯活人書治差後嘔竹葉湯加生薑嘔而思水者急與豬苓湯分利中風發熱六七日不解而煩渴飲水則吐名曰水逆五苓散和解半表裡證多嘔與小柴胡和之胸中有熱胃中有邪氣陰陽不交腹中痛欲嘔吐者黃連湯主之或黃芩加半夏生薑湯以升降陰陽溫胃嘔吐手足冷小橘皮湯理中湯生薑汁半夏湯半夏加橘皮湯溫中丸薑汁為要藥散其逆氣下乾嘔短氣汗出不惡寒者表解里未和十棗湯曾氏家學治吐逆大小便不通厥逆無脈大承氣下之愈灸口中和脈微澀弱皆灸厥陰脈經及千金翼林氏本曰一云灸厥陰五十壯收臟氣之真治例云若熱嘔不可無烏梅悸氣虛停飲陽氣內弱心下空虛正氣內動而為悸也胃不和則煩而悸悸證有八九皆屬三陽補中虛則心下悸脈結代心動悸炙甘草湯傷寒二三日心下悸小建中湯發汗過多其人胸中陽氣不足手冒心下悸欲得按者與桂枝甘草湯溫汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地真武湯少陰病四逆其人或悸者四逆散加桂主之或汗後臍下悸欲作奔豚茯苓桂甘大棗湯主之鎮固原氣脈浮因火迫劫之驚臥不安者桂枝去芍藥加蜀漆牡蠣龍骨救逆湯以固陽收脫鎮定其浮氣也和飲水多必心下悸雖有他邪亦先治悸恐水溢為喘為腫為咳為噦為利也茯苓甘草湯往來寒熱心下悸小便不利心煩喜嘔小柴胡主之驚惕或因汗下或因溫針或因火劫鎮定浮氣見前悸下和解傷寒八九日因下之胸滿煩驚小便不利澹語一身盡重不可轉側滿而煩者陽熱客於胸中也驚者心惡熱而神不守也小便不利津液不行裡虛也譫語者胃熱也一身盡重不能轉側者陽氣內行於里不榮於表也與柴胡加龍骨牡蠣湯以解錯雜之邪涼心硃砂安神丸東垣方渴邪氣初傳入里熱氣散漫未收斂成熱熏蒸焦膈搏耗津液遂成渴也六經渴有陰證有陽證解肌生津在太陽脈浮必用桂枝脈浮熱渴欲飲水小便不利豬苓湯清熱生津潤燥白虎加人參吐汗下之後渴者用之陽明脈長有汗發熱而渴白虎之類夏至左右煩渴發熱不惡寒虛煩竹葉石膏湯和解太陽脈弦而嘔邪在半表裡小柴胡加瓜蔞根之類證治云厥陰病消渴氣上衝心心中疼熱茯苓白朮甘草桂四物湯汗下後胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者柴胡桂枝幹薑湯溫中少陰自利而渴小便清白下焦虛寒也甘草乾薑湯心煩但欲寐或自利而渴屬少陰理中湯活人書云自利而渴屬少陰白通湯加豬膽汁通脈四逆真武湯選用之分利小便不利而渴必發黃茵陳五苓散汗後脈浮煩渴者五苓散主之與水厥陰脈微引飲宜少少與之但渴與水常令不足勿極意也清鎮天水或辰砂解肌表表邪不解或有或為之證小青龍去半夏加瓜蔞根主之下陽明脈長而實有汗而渴者調胃承氣主之脈沉滑熱實煩躁而渴大陷胸陽毒燥盛大渴黑奴丸厥陰證此事難知云煩懣囊縮大小便不通發熱引飲尺寸俱微緩直指方云厥陰屬肝心之母也裡熱已極子氣乘母挾心火以為煩煩則消渴矣振近乎戰也傷寒振者皆積其虛寒也下後復發汗必振寒者表裡俱虛也亡血家發汗則寒慄而振者血氣俱虛也有身為振振搖者皆為發汗過多亡陽經虛不能自主持故身為振搖也溫經太陽病發汗後不解其人仍發熱心下悸頭眩身瞤動振振欲擗地真武湯主之和經益陽吐下后里虛氣上逆陽不足起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯或小建中湯主之戰慄為病欲解也戰為正與邪爭爭則為鼓慄而戰振但虛而不至爭故止從行動而振也慄為心戰戰外為慄內皆陰陽之爭也戰者正氣勝慄者邪氣勝也助陽具前溫經散寒具前桂枝白朮甘草救逆韓氏治汗下後戰與救逆湯微減與羊肉湯再投而戰解灸陰氣內盛正氣太虛心慄而鼓頷身不戰者已而遂成寒逆者宜灸之搖頭陽脈不治則頭為之搖直里痛所致卒口噤背反張獨搖頭者痙病風主動使然也直視搖頭者為心絕缺治例四逆四肢臂逆而不溫者是也積涼成寒積溫成熱非一朝一夕之故六腑氣絕於外者四肢手足寒冷足脛寒逆少陰也四肢厥冷身寒者厥陰也溫若始得之手足便厥而不溫者是陰經受邪陽氣不足可用四逆湯輩溫之散熱收陰若手足自熱而至溫從四逆而至厥者傳經之邪也與四逆散甘草枳殼柴胡芍藥以散傳經之熱而收陰氣此非虛寒之證也熱之活人書有玉女散霹靂散許學士用黑錫丹近世用三建湯陰病下利清穀裡寒外熱手足厥逆脈微欲絕者身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者此陰盛於內不相通也與通脈四逆湯以成氏謂厥證甚於四逆詳仲景治例則四肢通冷其病為重灸蔥熨厥有陰陽不相順接便為厥厥者手足逆冷是也陽氣內陷熱氣逆伏而手足冷也先熱而後厥者熱伏於內也先厥而後熱者陰退而陽氣得復也始得便厥者是陽氣不足而陰氣勝也大抵厥逆為陰所主寒者多矣發熱七八日身冷此名臟厥難治有冷厥熱厥證治引孫兆云若證未辨陰陽且與四順丸試之直指方云未辨疑似且以理中丸試之陽厥則有熱陰厥則無熱溫冷厥才病便厥高保衡云寒厥外多靜而了了脈雖伏按之遲弱陰氣勝陽不得復厥多熱少當溫之理中湯龐氏曰寒熱而厥面色不澤昏昧者當用綿衣包手足溫暖必大汗而解也少陰病吐利手足厥冷煩躁欲絕者吳茱萸湯厥日多熱日少為陽氣退病進也謂其脈浮遲或微或細或沉皆屬裡有寒也正陽回陰無熱證而厥當歸四逆加茱萸生薑湯白通湯白通加豬膽汁湯選用之虛者宜附子湯補原氣證治曰有熱者黃耆人參建中湯熱厥必四五日才發半日之間熱復來也發熱日多厥日少病自愈外證多昏憒脈雖伏按之數而有力兼下兩解下例法中約之下其脈沉伏而滑頭面有汗指爪溫皆陽實伏熱在內也小便赤大便秘脈沉滑四肢逆冷熱深也皆宜急下之大小承氣湯片玉云熱深厥深調胃承氣湯吐諸陽受氣於胸中邪氣留客則陽氣不得敷布而手足為之厥脈乍緊心中滿而煩飢不能食病在胸中當吐之解表寒熱而厥面色不澤冒昧兩手忽無脈或一手無脈必是有汗也與麻黃桂枝各半湯厥而心下悸先治其水茯苓甘草湯兩解初得之身熱頭痛以後大便秘小便赤或渴有譫語而厥大柴胡湯清熱漬形厥而渴者白虎湯刺具不仁例中灸龐氏曰脈促而厥者灸之鄭聲汗後人及久病人聲轉者是也為重語也鄭為聲轉也若聲重而轉本音者亦是也止為正氣虛而不全故使轉聲而不正也如大小便利手足冷脈細微弱者是補助陽扶正也和解見譫語例下譫語脈短者死沉細不過一二日死實則譫語氣收斂在內而實者本病也或氣上逆而喘或下利皆為逆也不治又作譫謂妄有所見而言也真氣昏亂神識不清所致有被火劫有汗出有下利有下血有燥屎在胃有三陽合病有過經有亡陽譫語下下之緩微熱病人真氣昏神氣不清所致脈虛而長微弦滑者宜大承氣或柴胡飲子或腹滿身重難以轉側口不仁面垢譫語遺尿是三陽合病也汗出譫語此為風也須下之過經方可早則言必亂如下利譫語者下之急有燥屎也小承氣主之有潮熱反不能食者胃中必有燥屎五六枚也大熱入胃水竭躁煩必發譫語又腹滿微喘口乾咽燥或不大便久則譫語是因火劫所致也宜調胃承氣刺下血譫語者此為熱入血室當刺期門隨其實而瀉之脅下滿如結胸狀而譫語者是及經水適來皆熱入血室也解錯雜之邪傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯兼斂鎮神氣和解發汗多亡陽反身和譫語者不可下與柴胡桂枝湯和其榮衛溫亦有陽虛陰盛而譫妄脈沉細弱者當溫經助陽逐瘀血晝夜譫語喜忘小便自利小腹痛為瘀血抵當湯清熱譫語不惡寒反惡熱白虎湯煩不得眠白虎加梔子湯短氣氣短而不能相續者是呼吸難如而不能相續似喘而不搖肩似呻吟而無痛者短氣也發汗短氣但坐以汗出不徹故也更發汗則愈矣下乾嘔短氣汗出里未和十棗湯短氣煩躁心中懊憹陽氣內陷心中困硬則為結胸大陷胸湯有短氣腹滿而喘有潮熱者大柴胡主之此短氣之實者也溫經腹濡滿而短氣者邪在表而為虛也趺陽脈微而緊緊則為寒微則為虛微虛相搏則為短氣此短氣之虛者也瘈瘲瘈者筋脈急也瘲者筋脈緩也或搐急或舒緩而不止名曰瘈瘲也俗謂之搐是也邪熱氣極也熱盛則風搏並經絡風主動致四肢瘈瘲而不寧也病勢已過矣兩解疏風滌熱防風通聖散之類汗或汗不流是汗出時蓋發不同故腰背手足搐搦用牛蒡根散筋惕肉瞤此汗多亡陽之所致也久而成痿逆之甚也內經曰陽氣者精則養神柔則養筋發汗及下後亡津液陽虛筋肉失所養故惕然而跳瞤虛甚也溫經益陽具前振溫經下疏風濕防風白朮牡蠣湯和經益陽具前振下鬱冒鬱結為氣不舒冒為昏神不清也世俗謂之昏迷是也多虛極乘寒所致或因吐下使然漬形為汗太陽病誤先下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和也溫中吐下後極虛復極汗者復與之水因得噦下有熱而怫鬱或不得臥有燥屎故也刺太陽少陽並病頭痛或冒悶如結胸狀當刺大椎第一間及肺肝二俞慎不可汗動氣奔豚者動氣也築築然動於腹中者是矣臟氣不治隨臟所主發泄於臍之四旁動跳築築然謂之動氣難經所謂臍左右有動氣是臟氣不治真氣虛雖有表裡攻發之證即不可汗下行氣逐熱汗下後臍四旁有動氣方見保命集中溫衛汗下後臍下有動氣茯苓散補養氣血行氣養血枳殼散行氣清熱防葵散自利謂不經攻下為自溏泄自利不渴屬太陰也以其臟寒也下利欲飲水者以有熱也身熱脈大為逆五臟氣絕於內者則下利不禁發汗太陽陽明合病必自下利葛根湯以發之嘔者加半夏下陽明與少陽合病必自下利大承氣主之發熱後重泄色黃赤此為有熱下利脈遲而滑者內實也脈滑而數者皆有宿食也和解太陽與少陽合病下利黃芩湯三陽病身必熱灸下利脈微澀嘔而汗出必更衣反少者當溫其上灸之以消陰少陰吐利手足不冷反發熱不至灸少陰太谿穴分利五苓豬苓等湯溫挾太陽脈證便不可溫脈微自利清穀此為寒少陰必瀉腎虛也可溫理中白通諸四逆湯主之鴨溏者寒也脅寒而利臍下必寒四逆湯輩少陰吐利手足必冷煩躁欲死吳茱萸湯主之劫少陰病下利便膿血者下焦不約而裡寒也宜用桃花湯以固澀之關腸洞泄便溺遺失用赤石禹餘糧湯薛汝明家傳名朱雀湯刺少陰下利便膿血者可刺之宣通血氣清熱自利而渴屬少陰白虎湯或黃連阿膠散脈浮大而長千金翼用葛根黃芩黃連湯協熱利白頭翁湯下血類要柏皮湯邪自陽傷入少陰腎虛客熱下利咽痛胸滿心煩者豬膚湯主之腸垢者熱也協熱而利必臍下熱赤石脂丸白頭翁湯解錯雜之邪邪傷里下後脈沉遲手足冷或吐膿血下利不止為難治麻黃升麻湯以潤肺除熱助陽熱入血室男子由陽明而傷女人則隨經而入男子則下血譫語婦人則月水適來邪得乘虛而入血自下則愈和解婦人傷寒經水適來得之七八日晝則明瞭暮則譫語如見鬼狀此熱入血室也寒熱如瘧宜小柴胡湯以和血也許氏小柴胡加生地保命集加牡丹皮元戎曰先服小柴胡去其熱次以四物湯和之下大實滿者桃仁承氣活人書云少腹滿小便利屬抵當湯刺七八日熱除而脈遲胸脅滿如結胸狀譫語者此熱入血室刺期門保命集用甘草芍藥湯不已刺隱白溫經保命集云表虛自汗身涼拘急脈沉而遲桂枝加附子紅花湯活人書曰發熱惡寒經水凝滯桂枝加紅花湯索矩云其血必結宜育腸湯不須治熱入血室無犯胃氣及上二焦必自愈是不須治也謂針藥皆不可以里無留邪但不妄犯熱隨血散必自愈發黃瘀熱在裡身必發黃有濕熱有畜血濕熱而實風濕熱而虛寒濕痞氣發汗瘀熱身黃麻黃連翹赤小豆湯脈浮而緊不可下宜各半湯下熱陽明身熱頭汗出小便不利渴引水此瘀熱在裡身黃茵陳蒿湯主之逐血身黃脈沉結少腹硬而小便自利其人如狂者又為畜血在下焦使之黃也抵當桃仁承氣主之散熱傷寒身黃髮熱為熱未實與梔子柏皮湯若大便自利而黃者茵陳梔子黃連三物湯溫經散濕發熱身黃一身盡痛或小便自利與朮附湯韓祗和云病人三五日脈微下藥太過虛甚脾胃津竭渴飲水自傷此陰濕傷脾變黃宜溫之茵陳茯苓湯及茯苓橘皮湯小茵陳湯茵陳四逆湯茵陳附子湯茵陳吳茱萸湯皆治陰黃證略例云病後飲食勞動中州變黃之病而生黃非壞之而得只用建中理中大建中等藥足矣和解有潮熱嗜臥心脅疼鼻乾身及目黃小便難小柴胡主之分利發熱頭汗渴引水小便利大便反快五苓加茵陳補亡云茵陳蒿汁調五苓散搐鼻初覺黃以瓜蒂散吹鼻內出黃水外治春夏時身黃而熱悶按韭菜向胸間擦之內消傷寒後因飲食致黃者用枳朮內消丸發狂有陽毒多嘔煩躁面赤脈實是也畜血發狂多脈沉微但欲嗽水不咽入吐升麻梔子湯龐氏云溫病無熱但狂言煩不安宜以豬苓散方寸匕服之隨以水一升服以吐之發散證治用升麻鱉甲散水漬用新汲水濕布搭於胸上溫散雙解黑奴丸下畜血者其人如狂以熱在下焦小腹當硬小便自利下血乃愈抵當湯脈弦而長調胃承氣湯脈沉實有表證大柴胡湯小腹結急者用桃仁承氣湯清鎮吐下後及虛人未解者宜與人參白虎辰砂之類清其浮火也直指方用寒水石黃連末各一錢調冷水送下又龍膽草一物湯治陽狂救逆有因火劫亡陽驚狂臥起不安屬桂枝去芍藥加蜀漆龍骨救逆湯逐熱三陽熱極脈大身熱渴而狂者黃連解毒湯不已用承氣湯逐血血上逆則喜忘血下畜則內爭其人如狂用抵當湯輕者犀角地黃湯活人書承氣湯喜忘如狂身黃屎黑血證諦也抵當湯無求子曰胸滿唇痿舌青口燥但嗽水不咽無熱為有瘀血必發狂也下血用犀角地黃芍藥湯疏風龐氏曰人患時氣六七日因發狂目瞪口噤手攣膕曲或張口不知人事口鼻氣絕但心頭溫面色和六脈皆動一如屍厥不知人五六日因作成敗計救之用風引湯加附子灌下兩服遂省壯陰陽氣獨盛陰氣暴絕必發狂走妄言面赤咽痛發斑或下利赤黃脈洪實或滑促宜酸苦之藥收陰抑陽苦酒葶藶生艾湯主之抑陽陽毒狂躁發斑甚者逾垣上屋輕者桔梗大黃湯升麻湯梔子仁湯霍亂上吐而下利揮霍而撩亂也邪在中焦胃氣不治為邪所傷使陰陽乖隔遂上吐而下利躁擾煩亂乃謂之霍亂但稱吐利者是有以異也溫中寒多不渴者理中丸主之無求子曰用扁豆湯治中湯四順附子湯小麥湯吐利手足冷腹痛甚加吳茱萸百證歌云吐利轉筋入腹者雞矢白湯主之脈微緩四肢冷建中加附子當歸湯沉細四君子加芍藥良薑湯分利吐利頭痛而熱熱多欲飲水五苓散主之散表通用藿香正氣散加桂風寒暑濕邪自外入正氣散降濕湯轉筋白朮湯平胃脈弦木剋土平胃散加木瓜刺乾霍亂或腹中急痛絞刺宜刺委中及絞刮奪命穴兩解發熱脈弦汗出不解心下痞而吐利大柴胡主之一法具自利下解肌汗後霍亂身體重者桂枝湯消暑吐利大渴煩躁冷汗出轉筋脈遲沉宜清暑益氣湯白虎湯香薷飲和解嘔而潮熱小柴胡乾霍亂鹽湯紫蘇丸主之散陰通陽吐利止汗出而厥不欲水四肢拘急脈微欲絕通脈四逆加豬膽汁湯勞復有差後勞役復有食復有女勞復和解勞役復發熱沖和湯解表脈浮以汗解之清熱竹葉石膏湯麥門冬湯下脈沉實勞復至腹滿譫語枳實大黃湯吐宿食而熱復枳實梔子豉湯吐之補補中益氣湯升陽益胃養榮陰陽易其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不舉眼中生花導陰氣燒裩散豭鼠橘皮湯大便不利脈數為熱陽邪偏結於內陰氣不能相雜故其證能食不大便名陽結脈沉遲為寒陰邪偏結於內陽氣不能相雜故其證不能食身重大便閉為陰結汗小便難為有津液可作汗小便數不可誤汗證似煩臥不著席服梔子湯或五苓散得汗而解下潮熱大便硬陽盛陰虛下證已具陽結證趙氏用調胃承氣難知用七宣丸醫鏡用五柔丸枳實湯備急丸許氏用大柴胡吐三下不通不可下攻便當上吐提之導蜜導豬膽汁導滋陰陽藏陰虛者頻進兔肉溫陰結活人書用金液丹索矩用審慎丸難知用厚朴湯醫鏡用半硫丸龐氏云臟厥四逆輩極冷服之和解陽結能食不大便或頭汗出惡寒手足冷或心滿不食大便硬不可下與沖和湯潤腸大便堅小便數不可下趺陽脈浮澀麻仁丸枳實丸浴用棕櫚皮燒湯坐盆內浴之亦謂之外迎熏虛者用皂角煙燻大便即通熨服藥不通即以鹽炒熱熨臍下須臾即通若臍下冷結不通不可便熨冷散攻心必死須先服溫藥久乃可熨脅痛少陽證表解里未和素有痞積在臍傍痛引小腹入陰筋者名臟結主死下心下堅滿引脅痛十棗湯和解往來寒熱胸脅滿痛柴胡牡蠣湯針腹痛有實有虛寒熱邪燥屎舊積按之不痛為虛痛者為實建中陽脈澀陰脈弦並泄利建中湯桂枝芍藥湯小建中薛汝明名芍藥湯和血厥陰證小腹痛當歸四逆湯下關脈實大便秘硬腹滿為實繞臍腹痛煩躁發作有時有燥屎也大小承氣腹滿時痛桂枝加大黃溫中兼泄利下重脈沉微四逆湯兼小便不利真武湯隨證選用逐熱胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯外接法略例云熨用灰包熨之灸龐氏云合灸不灸令病人冷結久而彌困氣衝心而死刺括欲吐利而煩躁者多有痧毒世俗以刺括委中穴咽痛陽毒少陰證伏氣清熱少陰腹痛脈沉細猶有咽痛者黃連龍骨湯溫中脈微弱有伏氣必先痛次下利當溫之手足冷或加吐利少陰證也下利不止手足冷咽痛無熱證四順丸少陰中風胸滿心煩咽痛自汗腰痛連䯒頭痛吐沫脈弦三因用桂枝附子散結下痰脈數而滑甘桔半夏湯針吹點敷咽痛有瘡黃柏細辛末敷之解毒陽毒脈浮數而大唾膿血千金外臺烏扇膏治之蛔厥溫胃烏梅丸理中丸利消渴吐蛔但用理中加大黃入蜜以利之陽證陽毒三陽病不治陽獨盛陰欲暴絕變為陽毒必發狂內外熱結舌又卷鼻內煤煙脈洪實滑促吐升麻梔子湯下陰證陰毒陰病盛則微陽消於上故其候沉重四肢逆冷臍腹築痛厥逆或冷六脈沉細時來疾尺脈小短而微寸口盛時大者皆其候也溫經真武湯四逆湯正陽回陰霹靂散灸關元氣海劫金液丹熨腹中急痛灰包熨之熏逆冷囊縮者以炒豆投熱醋中如法熏之太陽陽明合病自利發汗喘而胸滿者麻黃湯和解不下利但嘔者葛根加半夏湯兩解止利發表葛根湯太陽少陽合病和解黃芩湯止利利者為邪在半表半裡非汗下所宜止嘔清熱嘔者胃氣逆也黃芩加半夏生薑湯三陽合病腹滿身重難以轉側口中不仁譫語遺尿者不可汗下清熱和表裡白虎湯太陽少陽並病頭痛眩冒如結胸心下痞硬或譫語刺肺俞肝俞如頭項強刺大椎陰證似陽煩躁面赤身熱脈反沉微韓氏微旨曰面色雖見陽證蓋是陽在上焦其下二焦陰色已盛若調理得下焦有陽則上焦陽氣必下降也上焦雖見陽證其勢淺於下焦也溫見前發熱溫經例下直指方云理中湯四逆甘草乾薑湯隨證輕重用陽證似陰大便秘小便赤其脈沉滑四肢逆冷以其伏熱深也下治法見前厥證例下陰盛隔陽溫傷寒例云面少赤陰盛於內隔陽在外其病必重用通脈四逆湯正合仲景法陽盛拒陰下癍汗下後發者熱毒不散所致有溫毒熱病有表證脈浮數有表虛里實熱毒不散所以不可發汗不可輕易下有時氣所致消散白虎加參名化斑湯升麻玄參湯表證多防風通聖去硝黃調胃溫中陰證發癍補汗下後胃虛極而發者此火遊行於外所致宜補以降之白虎加參朮下身無大熱煩渴便實有癍調胃承氣泄熱豬膽雞子湯兼咽痛紫雪大青涼血溫毒發癍嘔逆黑膏化毒丹晝夜偏劇熱入血室陰虛亡陽溫經汗下後身無熱不渴晝則煩躁夜而安靜脈沉宜乾薑附子湯和解婦人熱入血室夜則譫語小柴胡加牡丹皮針口燥咽乾慎不可發汗清熱涼胃口乾少津液脈浮緊微數白虎加人參湯和解口苦脈浮緊咽乾舌燥宜小柴胡下少陰病得之三二日口燥咽乾急下之百合病百脈一宗悉致其病無經絡之狀欲食不食欲臥不臥有寒非寒有熱非熱默默不知所苦服藥即吐如有鬼神清熱涼血百合湯狐惑其候齒燥惡飲食面目乍赤乍白舌黑舌上白唇黑有瘡四肢沉重喜眠蟲食其喉為惑其聲嗄蟲食下部為狐其咽乾甚者蟲食臟而死殺蟲雄黃銳散膏納穀道中涼血唇瘡聲嗄桃仁湯清熱安蟲黃連犀角湯漱水不欲咽熱在經也涼血陽明身熱頭疼漱水不咽必發衄犀角地黃湯主之水氣兩解表不解心下有水氣乾嘔發熱喘咳渴或利小青龍主之下結胸有水氣但頭汗出大陷胸湯溫少陰腹痛小便不利四肢疼痛下利此有水真武湯厥而心下悸宜先治水茯苓甘草湯分利煩渴飲水水入即吐名水逆五苓散主之軟堅清熱病在陽當汗解反以水噀之其熱被卻不得去彌更益堅肉上粟起反不渴文蛤散小便不利邪畜於內津液不下行分利汗後脈浮煩渴五苓散和解汗後脅滿寒熱不利心煩桂枝幹薑湯下小便不利大便乍難乍易大小承氣湯選用溫自汗身寒小便不利甘草附子湯坐藥婦女用之男子用豬膽套定固下散寒少陰病四五日腹滿痛小便不利下利膿血桃花湯灸陰寒甚下閉者灸之陰證小便不利必陰囊縮入小腹痛欲死者灸石門穴仍與返魂丹當歸四逆湯世有醫人見小水不通炒鹽及熱藥臍下熨之以致陰氣俱熱熱無處出即上衝心往往有死者泄濕熱頭汗出小便不利渴引水漿瘀熱在內必發黃茵陳湯解錯雜之邪傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡龍骨牡蠣湯主之散傳陰之熱閉少陰陰病四逆其人或咳或悸或小便不利或腹中痛或吐利下重者四逆散主之溫經散濕少陰二三日不已至四五日腹痛小便不利四肢沉重疼痛自利者真武湯陽痓本作痓仰目是陽痓直指方云無汗先譫語者發剛痓發汗證治曰太陽無汗小便少氣上衝胸口噤欲作剛痓麻黃加葛根湯云岐子用麻黃加獨活防風湯下胸滿口噤臥不著席腳攣急其人必咬牙大承氣湯許氏次用小續命湯調之陰痓眼合是陰痓有汗先厥逆發柔痓發汗龐朱二氏用桂枝葛根湯朱肱溫陰痓厥逆筋脈俱急汗出不止桂心白朮散項強頭搖口噤附子散閉目合面附子防風散分利頭項強小腹滿小便難已成痓五苓散疏風養血防風當歸散不仁謂不柔和則癢痛寒熱皆不知也正氣為邪氣閉伏鬱而不散榮衛血氣虛少不能通行故斯然也經曰少陰脈不至腎氣微精血少奔氣促迫上入胸膈宗氣反復血結心下陽氣退下熱歸陰股與陰相動令身不仁此為屍厥其乘寒之厥鬱冒不仁可知矣溫直指方用甘草乾薑湯桂枝芍藥湯加乾薑各半湯以意度用針若越人入虢太子病屍厥以鬱冒不仁為可治刺之而痊濟者神醫之診也設脈浮洪身汗如油喘不休體不仁雖越人其能起之哉直視心腎臟氣絕也針經云骨之精為瞳子筋之精為黑血之精為絡氣之精為白五臟血氣調和榮於目則明矣今邪氣壅盛正氣已絕故衄家不可發汗汗則額上陷脈急緊直視不能眴也下其或有目中不了了睛不和無表裡證大便難身微熱者非直視此內實也可於大承氣大柴胡選用之遺尿風溫證被下必失溲三陽合病下焦氣絕不歸其部濁邪中下溫下焦脫陰陽虛用附子湯清熱自汗而熱白虎湯主之灸循衣摸床兼微喘直視小便利脈弦實者可治下大小承氣選用溫病春月病發熱惡寒頭疼脈來浮數瘟病當分治之解肌升麻解肌湯和解小柴胡竹葉湯溫瘧重感於寒變成溫瘧脈尺寸俱盛兼弦數和解先熱後寒小柴胡或白虎加桂枝清熱但熱不寒止用白虎風溫發汗敗毒獨活湯許氏用續命湯減麻黃附解肌柴胡桂枝湯或白朮湯加減用清熱汗後惡熱無下證知母石膏湯疏風頭目昏眩四肢煩疼荊芥散金匱風引湯溫疫溫毒陰脈實大陽脈洪數發熱發癍癮疹咳兼心悶清熱玄參升麻湯濕溫發熱頭疼胸間多汗兩脛逆冷妄言脈陽濡而弱陰小而急暑證中暑病熱自汗脈虛細弱清神益氣東垣清暑益氣湯清熱白虎湯解肌五苓散降痰逆消暑丸橘皮湯溫冷香飲子暍證中暑暍脈洪緊盛身熱惡寒頭痛心煩躁渴乃是分利五苓散益元散降火黃連解毒湯加香薷消暑香薷飲
